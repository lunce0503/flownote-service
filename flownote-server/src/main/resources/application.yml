server:
  port: ${PORT:${SERVER_PORT:8080}}
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/javascript,text/html,text/xml,text/plain,text/css,text/event-stream

spring:
  application:
    name: flownote-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/flownote}
    username: ${SPRING_DATASOURCE_USERNAME:flownote}
    password: ${SPRING_DATASOURCE_PASSWORD:change-me}
    driver-class-name: org.postgresql.Driver
    hikari:
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:600000}
      keepalive-time: ${SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME:120000}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:3000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:2000}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      username: ${SPRING_DATA_REDIS_USERNAME:}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:500ms}
  servlet:
    multipart:
      max-file-size: ${FLOWNOTE_MAX_UPLOAD_FILE_SIZE:50MB}
      max-request-size: ${FLOWNOTE_MAX_UPLOAD_REQUEST_SIZE:60MB}
  flyway:
    baseline-on-migrate: true
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info

flownote:
  cors:
    origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:5174}
  upload:
    dir: ${FLOWNOTE_UPLOAD_DIR:${user.dir}/uploads}
  storage:
    endpoint: ${FLOWNOTE_STORAGE_ENDPOINT:}
    bucket: ${FLOWNOTE_STORAGE_BUCKET:}
    region: ${FLOWNOTE_STORAGE_REGION:us-east-1}
    access-key-id: ${FLOWNOTE_STORAGE_ACCESS_KEY_ID:}
    secret-access-key: ${FLOWNOTE_STORAGE_SECRET_ACCESS_KEY:}
    public-base-url: ${FLOWNOTE_STORAGE_PUBLIC_BASE_URL:}
    validate-on-startup: ${FLOWNOTE_STORAGE_VALIDATE_ON_STARTUP:false}
  mobile:
    core-api-url: ${MOBILE_CORE_API_URL:http://localhost:8080}
    ai-api-url: ${MOBILE_AI_API_URL:http://localhost:8000}
    web-url: ${MOBILE_WEB_URL:http://localhost:5173}
    minimum-supported-version: ${MOBILE_MIN_SUPPORTED_VERSION:1.0.0}
    enabled-features: ${MOBILE_ENABLED_FEATURES:webview,auth,tasks,notes,canvas,agent}
  stocks:
    market-data-url: ${STOCK_MARKET_DATA_URL:http://localhost:8000/api/market}
