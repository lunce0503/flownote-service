server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: flownote-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/flownote}
    username: ${SPRING_DATASOURCE_USERNAME:flownote}
    password: ${SPRING_DATASOURCE_PASSWORD:change-me}
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info

flownote:
  cors:
    origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  upload:
    dir: ${FLOWNOTE_UPLOAD_DIR:${user.dir}/uploads}
