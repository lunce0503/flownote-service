name: Mobile WAS Verification

on:
  pull_request:
    paths:
      - ".github/workflows/mobile-was.yml"
      - "docker-compose.yml"
      - ".env.example"
      - "docs/mobile-was-architecture.md"
      - "flownote-mobile/**"
      - "flownote-server/src/main/java/com/flownote/mobile/**"
      - "flownote-server/src/test/java/com/flownote/mobile/**"
      - "flownote-server/src/main/resources/application.yml"
      - "scripts/verify-mobile-was.sh"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/mobile-was.yml"
      - "docker-compose.yml"
      - ".env.example"
      - "docs/mobile-was-architecture.md"
      - "flownote-mobile/**"
      - "flownote-server/src/main/java/com/flownote/mobile/**"
      - "flownote-server/src/test/java/com/flownote/mobile/**"
      - "flownote-server/src/main/resources/application.yml"
      - "scripts/verify-mobile-was.sh"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: yarn
          cache-dependency-path: flownote/yarn.lock

      - name: Check mobile lockfile
        run: |
          if [ ! -f flownote-mobile/yarn.lock ]; then
            echo "flownote-mobile/yarn.lock is missing. Run 'cd flownote-mobile && yarn install' and commit the lockfile." >&2
            exit 1
          fi
          echo "flownote-mobile/yarn.lock is present."

      - name: Install mobile dependencies
        working-directory: flownote-mobile
        run: yarn install --frozen-lockfile --non-interactive

      - name: Run mobile WAS verification
        run: ./scripts/verify-mobile-was.sh
