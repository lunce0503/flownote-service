services:
  # 1. 데이터베이스
  db:
    image: postgres:16
    container_name: flownote-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./DB:/var/lib/postgresql/data # 이미지의 DB 폴더 사용
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flownote-redis
    restart: always
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. FastAPI 백엔드
  api-server:
    build: ./flownote-API
    container_name: flownote-api
    restart: always
    env_file:
      - ./flownote-API/.env
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-http://${HOST_LAN_IP:-localhost}:3000,http://${HOST_LAN_IP:-localhost}:5173,http://${HOST_LAN_IP:-localhost}:8081,http://localhost:3000,http://localhost:5173,http://localhost:8081}
      - JWT_SECRET=${JWT_SECRET}
      - CORE_API_BASE_URL=http://spring-server:8080
      # 에이전트 노트: 내부망 Ollama(gemma4+embeddinggemma) 및 sqlite 인덱스 경로
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - AGENT_NOTE_DB_PATH=${AGENT_NOTE_DB_PATH:-/app/data/agent_note.db}
    ports:
      - "8000:8000"
    volumes:
      - agent-note-data:/app/data # 에이전트 노트 캡션 인덱스(sqlite) 영속화
    depends_on:
      - spring-server
      - ollama

  # 2-1. Spring Boot 메인 백엔드
  spring-server:
    build: ./flownote-server
    container_name: flownote-spring
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://${HOST_LAN_IP:-localhost}:3000,http://${HOST_LAN_IP:-localhost}:5173,http://${HOST_LAN_IP:-localhost}:8081,http://localhost:3000,http://localhost:5173,http://localhost:8081}
      - FLOWNOTE_UPLOAD_DIR=/public/uploads
      - MOBILE_CORE_API_URL=${MOBILE_CORE_API_URL:-http://${HOST_LAN_IP:-localhost}:8080}
      - MOBILE_AI_API_URL=${MOBILE_AI_API_URL:-http://${HOST_LAN_IP:-localhost}:8000}
      - MOBILE_WEB_URL=${MOBILE_WEB_URL:-http://${HOST_LAN_IP:-localhost}:5173}
      - MOBILE_MIN_SUPPORTED_VERSION=${MOBILE_MIN_SUPPORTED_VERSION:-1.0.0}
      - MOBILE_ENABLED_FEATURES=${MOBILE_ENABLED_FEATURES:-webview,auth,tasks,notes,canvas,agent}
      - STOCK_MARKET_DATA_URL=http://api-server:8000/api/market
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - FLOWNOTE_CANVAS_CACHE_TARGET_USERNAME=${FLOWNOTE_CANVAS_CACHE_TARGET_USERNAME:-lunce}
      - FLOWNOTE_CANVAS_CACHE_TTL=${FLOWNOTE_CANVAS_CACHE_TTL:-24h}
      - FLOWNOTE_STORAGE_ENDPOINT=${FLOWNOTE_STORAGE_ENDPOINT}
      - FLOWNOTE_STORAGE_BUCKET=${FLOWNOTE_STORAGE_BUCKET}
      - FLOWNOTE_STORAGE_REGION=${FLOWNOTE_STORAGE_REGION}
      - FLOWNOTE_STORAGE_ACCESS_KEY_ID=${FLOWNOTE_STORAGE_ACCESS_KEY_ID}
      - FLOWNOTE_STORAGE_SECRET_ACCESS_KEY=${FLOWNOTE_STORAGE_SECRET_ACCESS_KEY}
      - FLOWNOTE_STORAGE_PUBLIC_BASE_URL=${FLOWNOTE_STORAGE_PUBLIC_BASE_URL}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /mnt/storage/uploads:/public/uploads

  # 3. Next.js 프론트엔드
  next-app:
    build: ./flownote-next
    container_name: flownote-next
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./flownote-next/.env.local
    environment:
      - CORE_API_URL=http://spring-server:8080
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - WEB_ORIGIN=${WEB_ORIGIN}
      - REPORT_PATH=/app/report/server-db-role-report.html
    depends_on:
      - spring-server
    volumes:
      - ./logs/report:/app/report:ro

  # 4. React (Vite) SPA
  react-app:
    build:
      context: ./flownote
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://${HOST_LAN_IP:-localhost}:8000}
        VITE_API_BASE_URL2: ${VITE_API_BASE_URL2:-http://${HOST_LAN_IP:-localhost}:3000}
        VITE_CORE_API_URL: ${VITE_CORE_API_URL:-http://${HOST_LAN_IP:-localhost}:8080}
        VITE_AI_BASE_URL: ${VITE_AI_BASE_URL:-http://${HOST_LAN_IP:-localhost}:8000}
        VITE_CANVAS_API_URL: ${VITE_CANVAS_API_URL:-http://${HOST_LAN_IP:-localhost}:8080}
        VITE_CANVAS_SOCKET_URL: ${VITE_CANVAS_SOCKET_URL:-http://${HOST_LAN_IP:-localhost}:8000}
        VITE_UPLOAD_API_URL: ${VITE_UPLOAD_API_URL:-http://${HOST_LAN_IP:-localhost}:8080}
        VITE_SYNC_API_URL: ${VITE_SYNC_API_URL:-http://${HOST_LAN_IP:-localhost}:3000}
    container_name: flownote-react
    restart: always
    ports:
      - "5173:5173"
    env_file:
      - ./flownote/.env
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      - VITE_API_BASE_URL2=${VITE_API_BASE_URL2}
      - VITE_CORE_API_URL=${VITE_CORE_API_URL}
      - VITE_AI_BASE_URL=${VITE_AI_BASE_URL}
      - VITE_CANVAS_SOCKET_URL=${VITE_CANVAS_SOCKET_URL:-http://${HOST_LAN_IP:-localhost}:8000}
      - VITE_SYNC_API_URL=${VITE_SYNC_API_URL:-http://${HOST_LAN_IP:-localhost}:3000}
    depends_on:
      - api-server

  # 5. Expo 모바일 앱 개발 서버
  mobile-app:
    build: ./flownote-mobile
    container_name: flownote-mobile
    restart: always
    init: true
    stdin_open: true
    tty: true
    environment:
      - EXPO_PUBLIC_WAS_URL=${EXPO_PUBLIC_WAS_URL:-http://${HOST_LAN_IP:-localhost}:8080}
      - REACT_NATIVE_PACKAGER_HOSTNAME=${HOST_LAN_IP:-localhost}
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - EXPO_NO_TELEMETRY=1
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: ["npx", "expo", "start", "--host", "lan", "--port", "8081"]
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    depends_on:
      - spring-server
      - react-app

  # 6. Ollama 로컬 LLM (내부망 전용 · GPU 없음/CPU) — 클라우드 미배포
  ollama:
    image: ollama/ollama:latest
    container_name: flownote-ollama
    restart: always
    environment:
      # 다른 컨테이너가 ollama:11434 로 접근하려면 0.0.0.0 바인딩 필수(기본 127.0.0.1이면 내부 통신 불가)
      - OLLAMA_HOST=0.0.0.0:11434
      # CPU 단일/소수 사용 전제: 동시 처리 1, 모델 로드 유지로 재로딩 지연 방지
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_KEEP_ALIVE=1h
    volumes:
      - ollama-models:/root/.ollama # 모델 가중치 캐시(재다운로드 방지)
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # 내부 서비스: 호스트 포트 publish/공개 도메인 없음. 접근은 compose 네트워크의 ollama:11434
    # 최초 1회 모델 받기: docker compose exec ollama ollama pull gemma4:e2b-it-qat

volumes:
  ollama-models:
  agent-note-data:
