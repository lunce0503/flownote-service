# 예시 전용 파일이다. Codex는 일반적으로 ~/.codex/config.toml을 읽는다.
# 필요한 값만 사용자 설정으로 옮기거나 `codex -c`로 전달한다.

model = "gpt-5.5"
ask_for_approval = "never"
sandbox = "workspace-write"

[projects."/home/kwon/Flownote/service"]
trust_level = "trusted"

[profiles.flownote]
sandbox = "workspace-write"
ask_for_approval = "never"